<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1E"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <linearGradient id="stroke-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00E6AD"/>
      <stop offset="100%" style="stop-color:#00C896"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" rx="200" fill="url(#bg)"/>

  <!-- Shield — hollow, green outline only -->
  <path
    d="M 300,155 L 700,155 Q 765,155 765,220 L 765,505 Q 765,685 500,790 Q 235,685 235,505 L 235,220 Q 235,155 300,155 Z"
    fill="none"
    stroke="url(#stroke-grad)"
    stroke-width="28"
    stroke-linejoin="round"
  />

  <!-- Wordmark -->
  <text
    x="500"
    y="910"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="700"
    font-size="110"
    letter-spacing="4"
    fill="#ffffff"
  >vomni</text>
</svg>
